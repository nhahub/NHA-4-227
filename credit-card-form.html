<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Credit Card Form</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    font-family: 'Rajdhani', sans-serif;
    padding: 24px 16px 48px;
  }

  /* ── Wrapper ── */
  .wrapper {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* ══════════════════════════
     CARD SCENE
  ══════════════════════════ */
  .card-scene {
    width: 360px;
    height: 220px;
    perspective: 1200px;
    margin-bottom: -28px;
    position: relative;
    z-index: 10;
  }

  .card-flipper {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(0.4, 0.2, 0.2, 1);
  }

  .card-flipper.flipped {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 18px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
  }

  /* Card gradient background */
  .card-face::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #0d1b3e 0%, #1a1060 40%, #0d0826 100%);
    z-index: 0;
  }

  /* Radial glow overlay */
  .card-face::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 30% 40%, rgba(99, 102, 241, 0.35) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 70%, rgba(139, 92, 246, 0.2) 0%, transparent 50%);
    z-index: 1;
  }

  .card-back {
    transform: rotateY(180deg);
  }

  /* Subtle shine lines */
  .card-shine {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(105deg, transparent 20%, rgba(255,255,255,0.04) 40%, transparent 60%),
      linear-gradient(195deg, transparent 20%, rgba(255,255,255,0.03) 40%, transparent 60%);
    z-index: 2;
    border-radius: 18px;
  }

  /* Card border glow */
  .card-face {
    box-shadow:
      0 20px 60px rgba(0,0,0,0.5),
      0 0 0 1px rgba(255,255,255,0.08),
      inset 0 1px 0 rgba(255,255,255,0.12);
  }

  /* ── FRONT ── */
  .card-front-content {
    position: absolute;
    inset: 0;
    z-index: 3;
    padding: 22px 26px 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .card-top-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }

  .bank-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.75);
  }

  /* Chip */
  .chip {
    width: 42px;
    height: 32px;
    border-radius: 6px;
    background: linear-gradient(135deg, #d4a843 0%, #f5d47a 35%, #c8992e 65%, #e8c455 100%);
    position: relative;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    overflow: hidden;
  }

  .chip::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 7px, rgba(0,0,0,0.18) 7px, rgba(0,0,0,0.18) 8px),
      repeating-linear-gradient(90deg, transparent, transparent 7px, rgba(0,0,0,0.18) 7px, rgba(0,0,0,0.18) 8px);
  }

  .chip::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 14px;
    height: 14px;
    border-radius: 2px;
    border: 1.5px solid rgba(0,0,0,0.25);
    background: linear-gradient(135deg, rgba(255,255,255,0.3), transparent);
  }

  /* Contactless icon next to chip */
  .contactless {
    width: 20px;
    height: 20px;
    position: relative;
    margin-top: 6px;
  }

  .contactless::before,
  .contactless::after {
    content: '';
    position: absolute;
    border: 1.5px solid rgba(255,255,255,0.35);
    border-radius: 50%;
  }

  .contactless::before {
    width: 12px; height: 12px;
    top: 4px; left: 4px;
    border-right-color: transparent;
    border-bottom-color: transparent;
    transform: rotate(-45deg);
  }

  .contactless::after {
    width: 20px; height: 20px;
    top: 0; left: 0;
    border-right-color: transparent;
    border-bottom-color: transparent;
    transform: rotate(-45deg);
  }

  .chip-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 4px;
  }

  /* Card number */
  .card-number {
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.92);
    text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    display: flex;
    gap: 12px;
    margin-top: 2px;
  }

  .card-number span {
    min-width: 52px;
    transition: opacity 0.2s;
  }

  /* Bottom row */
  .card-bottom-row {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .card-holder-block, .card-expiry-block {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .card-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    font-weight: 600;
  }

  .card-holder-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.9);
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .card-expiry {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    color: rgba(255,255,255,0.9);
    letter-spacing: 1px;
  }

  /* VISA logo */
  .visa-logo {
    font-family: 'Times New Roman', serif;
    font-size: 26px;
    font-weight: 900;
    font-style: italic;
    color: #fff;
    letter-spacing: -2px;
    text-shadow: 0 2px 6px rgba(0,0,0,0.3);
    line-height: 1;
    padding-bottom: 2px;
  }

  /* ── BACK ── */
  .card-back-content {
    position: absolute;
    inset: 0;
    z-index: 3;
    display: flex;
    flex-direction: column;
  }

  .mag-stripe {
    width: 100%;
    height: 42px;
    background: linear-gradient(180deg, #1a1a1a, #333, #111);
    margin-top: 28px;
  }

  .sig-area {
    display: flex;
    align-items: center;
    margin: 14px 24px 0;
    gap: 10px;
  }

  .sig-strip {
    flex: 1;
    height: 36px;
    background: repeating-linear-gradient(
      -55deg,
      #e8e8e8 0px, #e8e8e8 6px,
      #fff 6px, #fff 12px,
      #f5c5c5 12px, #f5c5c5 18px,
      #fff 18px, #fff 24px
    );
    border-radius: 3px;
    display: flex;
    align-items: center;
    padding: 0 10px;
    font-size: 11px;
    color: rgba(0,0,0,0.3);
    letter-spacing: 1px;
    font-style: italic;
  }

  .cvv-box {
    background: #fff;
    border-radius: 4px;
    padding: 4px 12px;
    min-width: 52px;
    text-align: center;
  }

  .cvv-label-back {
    font-size: 9px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    text-align: right;
    margin-right: 24px;
    margin-top: 4px;
    text-transform: uppercase;
  }

  .cvv-dots {
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    color: #111;
    letter-spacing: 3px;
  }

  .back-bank {
    position: absolute;
    bottom: 16px;
    right: 24px;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
  }

  .back-visa {
    position: absolute;
    bottom: 14px;
    left: 24px;
    font-family: 'Times New Roman', serif;
    font-size: 18px;
    font-weight: 900;
    font-style: italic;
    color: rgba(255,255,255,0.5);
    letter-spacing: -1px;
  }

  /* ══════════════════════════
     FORM CARD
  ══════════════════════════ */
  .form-card {
    width: 100%;
    background: #fff;
    border-radius: 20px;
    padding: 52px 32px 32px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.35);
  }

  .form-title {
    font-size: 22px;
    font-weight: 700;
    color: #1e1b4b;
    letter-spacing: 0.5px;
    margin-bottom: 24px;
    text-align: center;
  }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #6b7280;
  }

  .field input,
  .field select {
    width: 100%;
    padding: 13px 16px;
    border: 2px solid #e5e7eb;
    border-radius: 12px;
    font-size: 15px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    color: #1e1b4b;
    background: #f9fafb;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    appearance: none;
    -webkit-appearance: none;
  }

  .field input::placeholder {
    color: #c4c9db;
    font-weight: 400;
  }

  .field input:focus,
  .field select:focus {
    border-color: #6366f1;
    background: #fff;
    box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
  }

  .field input.cvv-input:focus {
    border-color: #8b5cf6;
    box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.12);
  }

  /* Number input: hide arrows */
  .field input[type=number]::-webkit-outer-spin-button,
  .field input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .field input[type=number] { -moz-appearance: textfield; }

  .row-half {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .row-expiry {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  /* Select wrapper for arrow */
  .select-wrap {
    position: relative;
  }

  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: #9ca3af;
    font-size: 14px;
    pointer-events: none;
  }

  /* Submit button */
  .btn-submit {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #fff;
    background: linear-gradient(135deg, #6366f1, #8b5cf6, #4f46e5);
    background-size: 200% 200%;
    background-position: 0% 50%;
    box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4);
    transition: transform 0.15s, box-shadow 0.15s, background-position 0.4s;
    margin-top: 8px;
  }

  .btn-submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(99, 102, 241, 0.5);
    background-position: 100% 50%;
  }

  .btn-submit:active {
    transform: translateY(0);
    box-shadow: 0 4px 14px rgba(99, 102, 241, 0.3);
  }

  /* Success toast */
  .toast {
    display: none;
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #10b981;
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 1px;
    padding: 14px 28px;
    border-radius: 50px;
    box-shadow: 0 8px 24px rgba(16,185,129,0.4);
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 999;
    white-space: nowrap;
  }

  .toast.show {
    display: block;
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 420px) {
    .card-scene { width: 310px; height: 190px; }
    .card-number { font-size: 17px; gap: 8px; }
    .card-number span { min-width: 44px; }
    .form-card { padding: 48px 20px 24px; }
    .form-title { font-size: 18px; }
  }
</style>
</head>
<body>

<div class="wrapper">

  <!-- ── Card Preview ── -->
  <div class="card-scene">
    <div class="card-flipper" id="cardFlipper">

      <!-- FRONT -->
      <div class="card-face card-front">
        <div class="card-shine"></div>
        <div class="card-front-content">
          <div class="card-top-row">
            <div class="bank-name">SmartCard</div>
            <div style="opacity:0.6">
              <!-- wifi symbol -->
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2">
                <path d="M1.5 8.5a15 15 0 0 1 21 0"/>
                <path d="M5 12.5a10 10 0 0 1 14 0"/>
                <path d="M8.5 16.5a5 5 0 0 1 7 0"/>
                <circle cx="12" cy="20" r="1" fill="rgba(255,255,255,0.6)" stroke="none"/>
              </svg>
            </div>
          </div>

          <div class="chip-row">
            <div class="chip"></div>
          </div>

          <div class="card-number">
            <span id="cn1">••••</span>
            <span id="cn2">••••</span>
            <span id="cn3">••••</span>
            <span id="cn4">••••</span>
          </div>

          <div class="card-bottom-row">
            <div class="card-holder-block">
              <div class="card-label">Card Holder</div>
              <div class="card-holder-name" id="cardName">FULL NAME</div>
            </div>
            <div class="card-expiry-block">
              <div class="card-label">Expires</div>
              <div class="card-expiry" id="cardExpiry">MM/YY</div>
            </div>
            <div class="visa-logo">VISA</div>
          </div>
        </div>
      </div>

      <!-- BACK -->
      <div class="card-face card-back">
        <div class="card-shine"></div>
        <div class="card-back-content">
          <div class="mag-stripe"></div>
          <div class="sig-area">
            <div class="sig-strip">Authorized Signature</div>
            <div class="cvv-box">
              <div class="cvv-dots" id="cardCvvBack">•••</div>
            </div>
          </div>
          <div class="cvv-label-back">CVV</div>
          <div class="back-visa">VISA</div>
          <div class="back-bank">SmartCard Bank</div>
        </div>
      </div>

    </div>
  </div>

  <!-- ── Form Card ── -->
  <div class="form-card">
    <div class="form-title">Card Details</div>
    <div class="field-group">

      <div class="field">
        <label>Card Number</label>
        <input
          type="text"
          id="inputNumber"
          placeholder="•••• •••• •••• ••••"
          maxlength="19"
          inputmode="numeric"
          autocomplete="cc-number"
        />
      </div>

      <div class="field">
        <label>Cardholder Name</label>
        <input
          type="text"
          id="inputName"
          placeholder="Full Name"
          maxlength="26"
          autocomplete="cc-name"
        />
      </div>

      <div class="row-half">
        <div class="field">
          <label>Expiry</label>
          <div class="row-expiry">
            <div class="select-wrap">
              <select id="inputMonth">
                <option value="" disabled selected>MM</option>
                <option>01</option><option>02</option><option>03</option>
                <option>04</option><option>05</option><option>06</option>
                <option>07</option><option>08</option><option>09</option>
                <option>10</option><option>11</option><option>12</option>
              </select>
            </div>
            <div class="select-wrap">
              <select id="inputYear">
                <option value="" disabled selected>YY</option>
              </select>
            </div>
          </div>
        </div>

        <div class="field">
          <label>CVV</label>
          <input
            type="password"
            id="inputCvv"
            class="cvv-input"
            placeholder="•••"
            maxlength="4"
            inputmode="numeric"
            autocomplete="cc-csc"
          />
        </div>
      </div>

      <button class="btn-submit" id="btnSubmit">Confirm Payment</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">Payment Confirmed!</div>

<script>
  // ── Elements ──
  const flipper    = document.getElementById('cardFlipper');
  const cn1        = document.getElementById('cn1');
  const cn2        = document.getElementById('cn2');
  const cn3        = document.getElementById('cn3');
  const cn4        = document.getElementById('cn4');
  const cardName   = document.getElementById('cardName');
  const cardExpiry = document.getElementById('cardExpiry');
  const cardCvvBack = document.getElementById('cardCvvBack');

  const inputNumber = document.getElementById('inputNumber');
  const inputName   = document.getElementById('inputName');
  const inputMonth  = document.getElementById('inputMonth');
  const inputYear   = document.getElementById('inputYear');
  const inputCvv    = document.getElementById('inputCvv');
  const btnSubmit   = document.getElementById('btnSubmit');
  const toast       = document.getElementById('toast');

  // ── Populate years ──
  const thisYear = new Date().getFullYear();
  for (let y = thisYear; y <= thisYear + 10; y++) {
    const opt = document.createElement('option');
    opt.value = String(y).slice(-2);
    opt.textContent = String(y).slice(-2);
    inputYear.appendChild(opt);
  }

  // ── Card number formatting ──
  inputNumber.addEventListener('input', () => {
    let raw = inputNumber.value.replace(/\D/g, '').slice(0, 16);
    // Reformat with spaces
    const groups = [];
    for (let i = 0; i < 4; i++) {
      groups.push(raw.slice(i * 4, i * 4 + 4));
    }
    inputNumber.value = groups.filter(Boolean).join(' ');

    const pad = (g) => g.padEnd(4, '•');
    cn1.textContent = groups[0] ? pad(groups[0]) : '••••';
    cn2.textContent = groups[1] ? pad(groups[1]) : '••••';
    cn3.textContent = groups[2] ? pad(groups[2]) : '••••';
    cn4.textContent = groups[3] ? pad(groups[3]) : '••••';
  });

  // Prevent non-numeric keys
  inputNumber.addEventListener('keydown', (e) => {
    const allowed = ['Backspace','Delete','ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Tab'];
    if (!allowed.includes(e.key) && !/^\d$/.test(e.key)) e.preventDefault();
  });

  // ── Cardholder name ──
  inputName.addEventListener('input', () => {
    const val = inputName.value.trim().toUpperCase();
    cardName.textContent = val || 'FULL NAME';
  });

  // ── Expiry ──
  const updateExpiry = () => {
    const m = inputMonth.value;
    const y = inputYear.value;
    cardExpiry.textContent = (m && y) ? `${m}/${y}` : m ? `${m}/YY` : y ? `MM/${y}` : 'MM/YY';
  };
  inputMonth.addEventListener('change', updateExpiry);
  inputYear.addEventListener('change', updateExpiry);

  // ── CVV — flip card ──
  inputCvv.addEventListener('focus', () => flipper.classList.add('flipped'));
  inputCvv.addEventListener('blur',  () => flipper.classList.remove('flipped'));

  inputCvv.addEventListener('input', () => {
    let raw = inputCvv.value.replace(/\D/g, '').slice(0, 4);
    inputCvv.value = raw;
    cardCvvBack.textContent = raw ? '•'.repeat(raw.length) : '•••';
  });

  inputCvv.addEventListener('keydown', (e) => {
    const allowed = ['Backspace','Delete','ArrowLeft','ArrowRight','Tab'];
    if (!allowed.includes(e.key) && !/^\d$/.test(e.key)) e.preventDefault();
  });

  // ── Submit ──
  btnSubmit.addEventListener('click', () => {
    const num   = inputNumber.value.replace(/\s/g, '');
    const name  = inputName.value.trim();
    const month = inputMonth.value;
    const year  = inputYear.value;
    const cvv   = inputCvv.value;

    if (num.length < 16)    { shake(inputNumber); return; }
    if (!name)              { shake(inputName);   return; }
    if (!month || !year)    { return; }
    if (cvv.length < 3)     { shake(inputCvv); flipper.classList.add('flipped'); inputCvv.focus(); return; }

    // Show success toast
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);

    // Reset
    setTimeout(() => {
      inputNumber.value = '';
      inputName.value   = '';
      inputMonth.value  = '';
      inputYear.value   = '';
      inputCvv.value    = '';
      cn1.textContent   = '••••';
      cn2.textContent   = '••••';
      cn3.textContent   = '••••';
      cn4.textContent   = '••••';
      cardName.textContent   = 'FULL NAME';
      cardExpiry.textContent = 'MM/YY';
      cardCvvBack.textContent = '•••';
    }, 500);
  });

  // Shake animation for invalid field
  function shake(el) {
    el.style.animation = 'none';
    el.offsetHeight; // reflow
    el.style.animation = 'shake 0.4s ease';
    el.focus();
  }
</script>

<style>
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    15%      { transform: translateX(-6px); }
    30%      { transform: translateX(6px); }
    45%      { transform: translateX(-5px); }
